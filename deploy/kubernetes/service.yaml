# ClusterIP Service fronting the Airlock API on the contract port. Add an
# Ingress (with TLS) or change the type to expose it externally. The worker is
# a client of this Service, so it must stay reachable in-cluster as
# http://airlock-api:8787.
apiVersion: v1
kind: Service
metadata:
  name: airlock-api
  labels:
    app: airlock
    component: api
spec:
  type: ClusterIP
  selector:
    app: airlock
    component: api
  ports:
    - name: http
      port: 8787
      targetPort: http
      protocol: TCP
