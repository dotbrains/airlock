# Airlock control-plane Deployments: the API + dashboard and the cleanup
# worker, both from the shared image. Airlock holds no database (session state
# lives in Docker container labels), so there is no PVC — the control plane is
# stateless.
#
# The API needs a Docker engine to spawn browser containers. In a cluster the
# safe pattern is a REMOTE engine reachable over TLS (set via AIRLOCK_DOCKER_HOST
# in the secret); mounting a node's container socket is possible but grants the
# Pod node-root and is discouraged. See deploy/README.md.
#
# Replace `image:` with your registry path, e.g. ghcr.io/dotbrains/airlock:latest.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airlock-api
  labels:
    app: airlock
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airlock
      component: api
  template:
    metadata:
      labels:
        app: airlock
        component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: api
          image: ghcr.io/dotbrains/airlock:latest
          imagePullPolicy: IfNotPresent
          args: ["bun", "apps/api/dist/index.js"]
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: AIRLOCK_PORT
              value: "8787"
          # AIRLOCK_API_TOKEN, AIRLOCK_INTERNAL_TOKEN, AIRLOCK_DOCKER_HOST and
          # any TLS material live in the secret below.
          envFrom:
            - secretRef:
                name: airlock-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airlock-worker
  labels:
    app: airlock
    component: worker
spec:
  # Exactly one worker — the prune loop is idempotent but needs no parallelism.
  replicas: 1
  selector:
    matchLabels:
      app: airlock
      component: worker
  template:
    metadata:
      labels:
        app: airlock
        component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: worker
          image: ghcr.io/dotbrains/airlock:latest
          imagePullPolicy: IfNotPresent
          args: ["bun", "apps/worker/dist/index.js"]
          env:
            - name: AIRLOCK_API_BASE_URL
              value: "http://airlock-api:8787"
          envFrom:
            - secretRef:
                name: airlock-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
