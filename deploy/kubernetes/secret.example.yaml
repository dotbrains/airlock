# Example Secret for the Airlock control plane. Copy to secret.yaml, fill in
# real values (or generate with `kubectl create secret generic airlock-secrets
# --from-literal=...`), and keep it out of version control.
#
# stringData lets you paste plaintext; Kubernetes base64-encodes it on apply.
apiVersion: v1
kind: Secret
metadata:
  name: airlock-secrets
  labels:
    app: airlock
type: Opaque
stringData:
  # Bearer token for the dashboard + management API. Required.
  AIRLOCK_API_TOKEN: "replace-with-openssl-rand-hex-32"

  # Shared secret gating /api/internal/prune (api ↔ worker).
  AIRLOCK_INTERNAL_TOKEN: "replace-with-a-second-secret"

  # Remote Docker engine the API drives to spawn browser containers, e.g.
  # tcp://dockerd.internal:2376. Mounting a node socket is discouraged.
  AIRLOCK_DOCKER_HOST: "tcp://your-docker-engine:2376"
  # Directory (mounted separately) holding ca.pem/cert.pem/key.pem for the
  # TLS-protected engine above. Omit for an unauthenticated tcp:// engine.
  # AIRLOCK_DOCKER_CERT_PATH: "/etc/airlock/docker-certs"

  # Public base URL + host as seen by clients behind your Ingress/TLS.
  AIRLOCK_PUBLIC_BASE_URL: "https://airlock.example.com"
  AIRLOCK_SESSION_HOST: "airlock.example.com"

  AIRLOCK_VNC_PASSWORD: "change-me"
