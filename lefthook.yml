# lefthook configuration — Airlock's pre-commit gate.
# Install with: bunx lefthook install
#
# These commands together mirror `make check` (the aggregate gate CI runs), but
# run in parallel for a faster commit-time loop. Run `make check` for the exact
# serial suite CI uses.

pre-commit:
  parallel: true
  commands:
    format:
      run: bun run format:check
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck
    test:
      run: bun run test
    build:
      run: bun run build
