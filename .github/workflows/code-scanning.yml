name: code-scanning

# Static analysis for Airlock:
#   - actionlint - lints the workflow YAML under .github/workflows/.
#   - gitleaks  - scans the tree and history for committed secrets.
# CodeQL is intentionally omitted: its SARIF upload requires GitHub Advanced
# Security, which is not enabled on this repository.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  gitleaks:
    name: gitleaks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the scan covers prior commits, not just the tip.
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner --exit-code 1
