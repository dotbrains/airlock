name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (bun)
    # GitHub-hosted runners (ubuntu-latest) are unavailable on this org's
    # billing plan; use the managed Blacksmith runner like the other repos.
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.x"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run the aggregate check gate
        run: make check

  docker-build:
    name: docker-build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Build the shared deploy image
        # Smoke-builds the image every deploy/ adapter depends on; does not push.
        run: docker build -t airlock:ci .
